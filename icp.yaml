networks:
  - name: local
    mode: managed
    ii: true
    gateway:
      port: 8010

environments:
  - name: local
    network: local
    canisters:
      - magickbox_core
      - frontend

canisters:
  - name: magickbox_core
    recipe:
      type: "@dfinity/motoko@v4.1.0"
      configuration:
        main: canisters/magickbox_core/main.mo
        candid: canisters/magickbox_core/magickbox_core.did
  - name: frontend
    recipe:
      type: "@dfinity/asset-canister@v2.1.0"
      configuration:
        dir: dist
